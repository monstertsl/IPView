x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ipview
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  SECRET_KEY: change-me-in-production-use-64-char-random-hex
  ENCRYPT_KEY: change-me-in-production-use-64-char-random-hex

services:
  postgres:
    restart: always
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ipview
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ipview-network

  redis:
    restart: always
    image: redis:7-alpine

    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ipview-network

  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ipview-network

  celery:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info
    networks:
      - ipview-network

  celery-beat:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app beat --loglevel=info
    networks:
      - ipview-network

  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ipview-network

networks:
  ipview-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
